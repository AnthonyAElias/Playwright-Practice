<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playwright Practice Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" data-testid="app-shell"></div>

    <template id="login-template">
      <main class="auth-page" data-testid="login-page">
        <section class="auth-panel" aria-labelledby="login-title">
          <div class="brand-mark" aria-hidden="true">PW</div>
          <p class="eyebrow">Local test app</p>
          <h1 id="login-title">Playwright Practice Lab</h1>
          <p class="lede">Sign in to reach a dashboard with menus, filters, forms, and state changes built for automation practice.</p>

          <form class="login-form" data-testid="login-form" novalidate>
            <div class="field-group">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="text"
                inputmode="email"
                autocomplete="username"
                placeholder="demo@example.com"
                data-testid="email-input"
                required
              />
              <p class="field-error" data-testid="email-error" aria-live="polite"></p>
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <div class="password-row">
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="playwright"
                  data-testid="password-input"
                  required
                />
                <button class="icon-button" type="button" aria-label="Show password" data-testid="toggle-password">
                  <span aria-hidden="true">eye</span>
                </button>
              </div>
              <p class="field-error" data-testid="password-error" aria-live="polite"></p>
            </div>

            <label class="check-row" for="remember">
              <input id="remember" name="remember" type="checkbox" data-testid="remember-checkbox" />
              <span>Remember me</span>
            </label>

            <div class="form-alert" hidden data-testid="login-alert" role="alert"></div>

            <button class="primary-button" type="submit" data-testid="login-button" disabled>Log in</button>
          </form>

          <div class="credentials" data-testid="demo-credentials">
            <span>Demo credentials</span>
            <strong>demo@example.com</strong>
            <strong>playwright</strong>
          </div>
        </section>
      </main>
    </template>

    <template id="home-template">
      <div class="app-layout" data-testid="home-page">
        <aside class="sidebar" aria-label="Primary">
          <a class="logo-link" href="#home" aria-label="Playwright Practice Lab home" data-testid="home-logo">
            <span class="brand-mark small" aria-hidden="true">PW</span>
            <span>Practice Lab</span>
          </a>

          <nav class="nav-list" aria-label="Dashboard sections">
            <a href="#home" class="nav-link active" data-view="overview" data-testid="nav-overview">Overview</a>
            <a href="#intake" class="nav-link" data-view="intake" data-testid="nav-intake">Intake</a>
            <a href="#tasks" class="nav-link" data-view="tasks" data-testid="nav-tasks">Tasks</a>
            <a href="#settings" class="nav-link" data-view="settings" data-testid="nav-settings">Settings</a>
          </nav>

          <button class="ghost-button logout-button" type="button" data-testid="logout-button">Log out</button>
        </aside>

        <main class="workspace">
          <header class="topbar">
            <div>
              <p class="eyebrow">Welcome back</p>
              <h1 data-testid="home-heading">Automation Dashboard</h1>
            </div>
            <div class="profile-pill" data-testid="user-profile">
              <span class="avatar" aria-hidden="true">A</span>
              <span>Alex Tester</span>
            </div>
          </header>

          <section class="view active" data-view-panel="overview" data-testid="overview-panel" aria-labelledby="overview-title">
            <div class="section-heading">
              <div>
                <h2 id="overview-title">Overview</h2>
                <p>Use this screen to practice assertions against counters, tables, menus, and toast messages.</p>
              </div>
              <button class="secondary-button" type="button" data-testid="refresh-button">Refresh data</button>
            </div>

            <div class="metric-grid" data-testid="metrics-grid">
              <article class="metric-card">
                <span>Open tests</span>
                <strong data-testid="open-tests-count">12</strong>
              </article>
              <article class="metric-card">
                <span>Pass rate</span>
                <strong data-testid="pass-rate">94%</strong>
              </article>
              <article class="metric-card">
                <span>Flaky specs</span>
                <strong data-testid="flaky-count">3</strong>
              </article>
            </div>

            <div class="table-wrap" data-testid="runs-table-wrap">
              <table>
                <caption>Recent test runs</caption>
                <thead>
                  <tr>
                    <th scope="col">Suite</th>
                    <th scope="col">Status</th>
                    <th scope="col">Duration</th>
                    <th scope="col">Owner</th>
                  </tr>
                </thead>
                <tbody data-testid="runs-table-body">
                  <tr>
                    <td>Login smoke</td>
                    <td><span class="status success">Passed</span></td>
                    <td>18s</td>
                    <td>Alex</td>
                  </tr>
                  <tr>
                    <td>Checkout edge cases</td>
                    <td><span class="status warning">Flaky</span></td>
                    <td>42s</td>
                    <td>Morgan</td>
                  </tr>
                  <tr>
                    <td>Profile settings</td>
                    <td><span class="status success">Passed</span></td>
                    <td>25s</td>
                    <td>Jamie</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="view" data-view-panel="intake" data-testid="intake-panel" aria-labelledby="intake-title">
            <div class="section-heading">
              <div>
                <h2 id="intake-title">Intake</h2>
                <p>Create a Person record from applicant intake details.</p>
              </div>
            </div>

            <form class="intake-form" data-testid="intake-form">
              <div class="form-grid">
                <label class="field-group" for="first-name">
                  <span>First Name</span>
                  <input id="first-name" name="firstName" type="text" data-testid="first-name-input" required />
                </label>

                <label class="field-group" for="last-name">
                  <span>Last Name</span>
                  <input id="last-name" name="lastName" type="text" data-testid="last-name-input" required />
                </label>

                <label class="field-group" for="intake-email">
                  <span>Email</span>
                  <input id="intake-email" name="email" type="text" inputmode="email" data-testid="intake-email-input" required />
                </label>

                <label class="field-group" for="address">
                  <span>Address</span>
                  <input id="address" name="address" type="text" data-testid="address-input" required />
                </label>

                <label class="field-group" for="psl-select">
                  <span>PSL</span>
                  <select id="psl-select" name="psl" data-testid="psl-select">
                    <option value="T1">T1</option>
                    <option value="T2">T2</option>
                    <option value="T3">T3</option>
                  </select>
                </label>
              </div>

              <fieldset class="radio-field" data-testid="skip-applicant-intake-group">
                <legend>Skip Applicant Intake</legend>
                <label class="radio-row" for="skip-applicant-intake-yes">
                  <input id="skip-applicant-intake-yes" name="skipApplicantIntake" type="radio" value="Yes" data-testid="skip-applicant-intake-yes" />
                  <span>Yes</span>
                </label>
                <label class="radio-row" for="skip-applicant-intake-no">
                  <input id="skip-applicant-intake-no" name="skipApplicantIntake" type="radio" value="No" data-testid="skip-applicant-intake-no" checked />
                  <span>No</span>
                </label>
              </fieldset>

              <button class="primary-button" type="submit" data-testid="submit-intake-button">Submit</button>
            </form>

            <div class="table-wrap" data-testid="person-records-wrap">
              <table>
                <caption>Person records</caption>
                <thead>
                  <tr>
                    <th scope="col">First Name</th>
                    <th scope="col">Last Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Address</th>
                    <th scope="col">Skip Applicant Intake</th>
                    <th scope="col">PSL</th>
                  </tr>
                </thead>
                <tbody data-testid="person-records-body"></tbody>
              </table>
              <p class="empty-state person-empty-state" data-testid="person-empty-state">No Person records have been created.</p>
            </div>
          </section>

          <section class="view" data-view-panel="tasks" data-testid="tasks-panel" aria-labelledby="tasks-title">
            <div class="section-heading">
              <div>
                <h2 id="tasks-title">Tasks</h2>
                <p>Filter rows, complete items, and verify empty states.</p>
              </div>
              <label class="search-box" for="task-search">
                <span>Search</span>
                <input id="task-search" type="search" placeholder="Find task" data-testid="task-search" />
              </label>
            </div>

            <div class="task-list" data-testid="task-list"></div>
            <p class="empty-state" hidden data-testid="empty-state">No tasks match that search.</p>
          </section>

          <section class="view" data-view-panel="settings" data-testid="settings-panel" aria-labelledby="settings-title">
            <div class="section-heading">
              <div>
                <h2 id="settings-title">Settings</h2>
                <p>Try form filling, select controls, checkboxes, and save-state assertions.</p>
              </div>
            </div>

            <form class="settings-form" data-testid="settings-form">
              <label class="field-group" for="display-name">
                <span>Display name</span>
                <input id="display-name" type="text" value="Alex Tester" data-testid="display-name-input" />
              </label>

              <label class="field-group" for="theme-select">
                <span>Theme</span>
                <select id="theme-select" data-testid="theme-select">
                  <option value="system">System</option>
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </label>

              <label class="check-row" for="email-digest">
                <input id="email-digest" type="checkbox" checked data-testid="digest-checkbox" />
                <span>Email me a daily digest</span>
              </label>

              <button class="primary-button" type="submit" data-testid="save-settings-button">Save settings</button>
            </form>
          </section>
        </main>

        <div class="toast" hidden data-testid="toast" role="status" aria-live="polite"></div>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
